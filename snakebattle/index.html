// file: buttons.ms
function()
Button = class
  constructor = function(sprite, key, x, y)
    this.sprite = sprite
    this.key = key
    this.x = x
    this.y = y
    this.pressed = 0
  end
end

create_buttons = function()
  return [
    new Button("btn_w", "W", -84, 15),
    new Button("btn_a", "A", -94, 0),
    new Button("btn_s", "S", -84, -15),
    new Button("btn_d", "D", -74, 0),
    new Button("btn_up", "ARROW_UP", 84, 15),
    new Button("btn_left", "ARROW_LEFT", 74, 0),
    new Button("btn_down", "ARROW_DOWN", 84, -15),
    new Button("btn_right", "ARROW_RIGHT", 94, 0)
  ]
end

draw_buttons = function()
  screen.fillRect(-84,0,40,128,"#243")
  screen.fillRect(84,0,40,128,"#243")
  for btn in btns
    screen.drawSprite(btn.sprite + "." + btn.pressed, btn.x, btn.y)
  end
end

// returns list of buttons pushed
get_input = function()
  local inputs = []
  
  for btn in btns
    btn.pressed = 0
    if keyboard[btn.key] then
      btn.pressed = 1
    elsif touch.touching then
      for t in touch.touches
        if abs(t.x - btn.x) < 8 and abs(t.y - btn.y) < 8 then
          btn.pressed = 1
        end
      end
    end
    if btn.pressed then
      inputs.push(btn.sprite)
    end
  end
  
  return inputs
end
end()



// file: endscreen.ms
function()
Endscreen = class
  constructor = function()
    this.timer = 0
  end
  
  update = function()
    this.timer += 1
    if this.timer > 80 then
      this.timer = 0
      menu_init()
    end
  end
  
  draw = function()
    screen.clear()
    screen.fillRect(0,0,208,128,"#123")
    screen.drawText(last_result, 0, 0, 12, "#aaa")
    draw_buttons()
  end
end
end()



// file: game.ms
function()
Game = class
  constructor = function()
    this.snakes = [
      new Snake(82, "snake_red"),
      new Snake(89, "snake_yellow")
    ]
    
    this.pellet = -1
  end

  update = function()
    // get input
    local inputs = get_input()
    for key in inputs
      if key == "btn_w" then
        game.snakes[0].add("u")
      elsif key == "btn_a" then
        game.snakes[0].add("l")
      elsif key == "btn_s" then
        game.snakes[0].add("d")
      elsif key == "btn_d" then
        game.snakes[0].add("r")
      elsif key == "btn_up" then
        game.snakes[1].add("u")
      elsif key == "btn_left" then
        game.snakes[1].add("l")
      elsif key == "btn_down" then
        game.snakes[1].add("d")
      elsif key == "btn_right" then
        game.snakes[1].add("r")
      end
    end
    
    // move snakes
    local crash = 0
    for p=0 to 1
      local snake = game.snakes[p]
      local other = game.snakes[1-p]
      if snake.timer < 200 then
        snake.timer += snake.speed
      else
        snake.timer = 0
        local move = snake.get_move()
        if move == game.pellet then
          snake.grow = true
          other.grow = true
          other.speed += 2
          game.pellet = -1
        elsif snake.body.indexOf(move) != -1 or other.body.indexOf(move) != -1 then
          crash += p + 1
        end
        snake.move(move)
      end
    end
    
    // check result
    local result = 0
    if crash == 3 then
      result = "It's a draw!"
    elsif crash == 2 then
      result = "Red wins!"
      score[0] += 1
    elsif crash == 1 then
      result = "Yellow wins!"
      score[1] += 1
    end
    if result then
      endscreen_init(result)
      return
    end
    
    // spawn pellet
    if game.pellet == -1 then
      local t = random.nextInt(256)
      for snake in game.snakes
        if snake.body.indexOf(t) != -1 then
          t = -1
        end
      end
      game.pellet = t
    end
  end

  draw = function()
    screen.clear()
    screen.fillRect(0,0,128,128,"#123")
    for snake in game.snakes
      snake.draw()
    end
    if game.pellet != -1 then
      screen.drawSprite("pellet", to_x(game.pellet), to_y(game.pellet))
    end
    draw_buttons()
  end
end

end()

function()
// board positions

// pos is game coordinate from 0 to 255
to_x = function(pos)
  return (pos % 16) * 8 - 60
end

to_y = function(pos)
  return floor(pos / 16) * 8 - 60
end


// directions

opposites = object
  l = "r"
  r = "l"
  u = "d"
  d = "u"
end
end()

// file: snake.ms
function()
Snake = class
  constructor = function(start, sprite)
    this.body = [start, start + 1, start + 2, start + 3]
    this.b_dirs = ["r", "r", "r"]
    this.dir = "r"
    this.n_dirs = []
    this.timer = 0
    this.speed = 10
    this.grow = false
    this.sprite = sprite
  end
  
  add = function(new_dir)
    local d = dir
    if n_dirs.length != 0 then
      d = n_dirs[n_dirs.length - 1]
    end
    if new_dir != d and new_dir != opposites[d] then
      n_dirs.push(new_dir)
    end
  end
  
  get_move = function()
    // set dir to first element in input buffer
    if n_dirs.length != 0 then
      dir = n_dirs[0]
      n_dirs.removeAt(0)
    end
    
    // get next position
    local head = body[body.length - 1]
    local pos = -1
    
    if dir == "l" then
      pos = head - 1
      if (head % 16 == 0) then
        pos += 16
      end
    elsif dir == "r" then
      pos = head + 1
      if (pos % 16 == 0) then
        pos -= 16
      end
    elsif dir == "u" then
      pos = head + 16
      if (pos > 255) then
        pos -= 256
      end
    elsif dir == "d" then
      pos = head - 16
      if (pos < 0) then
        pos += 256
      end
    end

    return pos
  end
  
  move = function(pos)
    // update body and board
    body.push(pos)
    b_dirs.push(dir)
    if grow then
      grow = false
    else
      body.removeAt(0)
      b_dirs.removeAt(0)
    end
  end
  
  draw = function()
    for i=0 to body.length-2
      if b_dirs[i] == "l" then
        screen.drawSprite(sprite + ".1", to_x(body[i]), to_y(body[i]))
        screen.drawSprite(sprite + ".0", to_x(body[i+1]), to_y(body[i+1]))
      elsif b_dirs[i] == "r" then
        screen.drawSprite(sprite + ".0", to_x(body[i]), to_y(body[i]))
        screen.drawSprite(sprite + ".1", to_x(body[i+1]), to_y(body[i+1]))
      elsif b_dirs[i] == "u" then
        screen.drawSprite(sprite + ".3", to_x(body[i]), to_y(body[i]))
        screen.drawSprite(sprite + ".2", to_x(body[i+1]), to_y(body[i+1]))
      elsif b_dirs[i] == "d" then
        screen.drawSprite(sprite + ".2", to_x(body[i]), to_y(body[i]))
        screen.drawSprite(sprite + ".3", to_x(body[i+1]), to_y(body[i+1]))
      end
    end
  end
end
end()
